<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Obsidian Journal Elite</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased selection:bg-amber-500/30">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-6 border-b border-zinc-800 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-500 bg-clip-text text-transparent tracking-tight">XAUUSD JOURNAL ELITE</h1>
                <p class="text-zinc-500 text-xs mt-1 uppercase tracking-widest font-semibold">Gold Execution, Native Editing & Sheets Integration</p>
            </div>
            
            <!-- Target Tracking Widget -->
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl min-w-[280px] w-full md:w-auto">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">Growth Target Progress</span>
                    <div class="flex items-center space-x-1">
                        <span class="text-[10px] text-zinc-500 font-mono">Target: $</span>
                        <input type="number" id="target-input" class="w-20 bg-zinc-950 border border-zinc-800 rounded text-right px-1.5 py-0.5 text-xs font-mono text-amber-400 focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                <div class="w-full bg-zinc-950 h-2 rounded-full border border-zinc-800 overflow-hidden mb-1">
                    <div id="target-progress-bar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-full w-0 transition-all duration-500 ease-out"></div>
                </div>
                <div class="flex justify-between items-center text-[10px] font-mono text-zinc-500">
                    <span id="progress-text">0%</span>
                    <span id="remaining-text">Remaining: $0.00</span>
                </div>
            </div>
        </header>

        <!-- Capital Management Dashboard -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Initial Deposit</label>
                <div class="flex items-center border-b border-zinc-800 focus-within:border-amber-500 pb-1">
                    <span class="text-sm font-mono text-zinc-400 mr-1">$</span>
                    <input type="number" step="any" id="deposit-input" class="w-full bg-transparent text-base font-mono font-bold text-zinc-200 focus:outline-none" placeholder="0.00">
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Active Bonus</label>
                <div class="flex items-center border-b border-zinc-800 focus-within:border-amber-500 pb-1">
                    <span class="text-sm font-mono text-zinc-400 mr-1">$</span>
                    <input type="number" step="any" id="bonus-input" class="w-full bg-transparent text-base font-mono font-bold text-zinc-200 focus:outline-none" placeholder="0.00">
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Net P&L Return</label>
                <div class="pt-1">
                    <span id="total-pnl" class="text-base font-mono font-bold text-zinc-400">$0.00</span>
                </div>
            </div>
            <div class="bg-zinc-900 border border-amber-500/30 p-4 rounded-xl bg-gradient-to-br from-zinc-900 to-amber-950/10">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-amber-400 mb-1">Account Balance</label>
                <div class="pt-1">
                    <span id="account-balance" class="text-base font-mono font-black text-amber-400">$0.00</span>
                </div>
            </div>
        </section>

        <!-- Google Sheets Integration Bar -->
        <section class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl mb-8 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
            <div class="flex-1 w-full">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Google Apps Script Webhook URL</label>
                <input type="url" id="webhook-input" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-xs font-mono text-zinc-300 focus:outline-none focus:border-amber-500">
            </div>
            <div class="flex gap-2 self-stretch md:self-end">
                <button id="pull-btn" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-amber-400 font-bold px-4 py-2 rounded text-xs tracking-wider uppercase transition cursor-pointer whitespace-nowrap">
                    📥 Pull From Sheets
                </button>
                <button id="sync-btn" class="bg-amber-500 hover:bg-amber-600 text-zinc-950 font-bold px-4 py-2 rounded text-xs tracking-wider uppercase transition cursor-pointer whitespace-nowrap">
                    🔗 Push to Sheets
                </button>
            </div>
        </section>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Form Setup -->
            <div class="lg:col-span-1 bg-zinc-900 border border-zinc-800 p-6 rounded-xl h-fit">
                <h2 id="form-title" class="text-sm font-bold mb-4 tracking-wider text-zinc-300 uppercase border-b border-zinc-800 pb-2 flex items-center justify-between">
                    <span>Log Gold Print</span>
                    <span class="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded font-mono font-bold">XAUUSD</span>
                </h2>
                
                <form id="trade-form" class="space-y-4">
                    <input type="hidden" id="edit-id" value="">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Direction</label>
                            <select id="direction" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 font-medium focus:outline-none focus:border-amber-500 text-xs">
                                <option value="LONG">📈 Buy (Long)</option>
                                <option value="SHORT">📉 Sell (Short)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Net P&L ($)</label>
                            <input type="number" step="any" id="pnl" required placeholder="e.g. 150 or -80" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-100 font-mono text-xs focus:outline-none focus:border-amber-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Execution Time <span class="text-zinc-600 lowercase font-normal">(Leave blank for now)</span></label>
                        <input type="datetime-local" id="custom-date" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 font-mono text-xs focus:outline-none focus:border-amber-500">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Journal Notes & Psychology</label>
                        <textarea id="notes" rows="4" placeholder="Market narrative, technical setup reasons, emotional response, errors..." class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 focus:outline-none focus:border-amber-500 text-xs leading-relaxed"></textarea>
                    </div>

                    <div class="flex gap-2">
                        <button type="submit" id="submit-btn" class="flex-1 bg-amber-500 hover:bg-amber-600 text-zinc-950 font-black py-2.5 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs">
                            Commit Entry
                        </button>
                        <button type="button" id="cancel-edit-btn" class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-2.5 px-3 rounded transition cursor-pointer text-xs">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>

            <!-- Right Column: Ledger Feed -->
            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold tracking-wider text-zinc-300 uppercase">Execution Feed</h2>
                    <button id="clear-btn" class="text-xs text-zinc-600 hover:text-rose-400 transition cursor-pointer font-medium">Clear Data Matrix</button>
                </div>
                
                <div id="logs-container" class="space-y-3">
                    <!-- Dynamic Logs injection -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Database Architecture
        let trades = JSON.parse(localStorage.getItem('elite_gold_trades')) || [];
        let accountMeta = JSON.parse(localStorage.getItem('elite_gold_meta')) || { deposit: 0, bonus: 0, target: 1000, webhookUrl: '' };

        // DOM Inputs Initialization
        const depositInput = document.getElementById('deposit-input');
        const bonusInput = document.getElementById('bonus-input');
        const targetInput = document.getElementById('target-input');
        const webhookInput = document.getElementById('webhook-input');
        
        depositInput.value = accountMeta.deposit || '';
        bonusInput.value = accountMeta.bonus || '';
        targetInput.value = accountMeta.target || 1000;
        webhookInput.value = accountMeta.webhookUrl || '';

        // UI Target Hooks
        const tradeForm = document.getElementById('trade-form');
        const editIdInput = document.getElementById('edit-id');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const logsContainer = document.getElementById('logs-container');
        const totalPnlEl = document.getElementById('total-pnl');
        const balanceEl = document.getElementById('account-balance');
        const progressBar = document.getElementById('target-progress-bar');
        const progressText = document.getElementById('progress-text');
        const remainingText = document.getElementById('remaining-text');
        const clearBtn = document.getElementById('clear-btn');
        const syncBtn = document.getElementById('sync-btn');
        const pullBtn = document.getElementById('pull-btn');

        // Master UI Processing Loop
        function renderJournal() {
            logsContainer.innerHTML = '';
            
            let totalPnl = trades.reduce((sum, t) => sum + parseFloat(t.pnl), 0);
            let deposit = parseFloat(depositInput.value) || 0;
            let bonus = parseFloat(bonusInput.value) || 0;
            let targetGoal = parseFloat(targetInput.value) || 1000;
            let netBalance = deposit + bonus + totalPnl;

            // Sort trades chronologically
            trades.sort((a, b) => new Date(b.dateISO) - new Date(a.dateISO));

            if (trades.length === 0) {
                logsContainer.innerHTML = `
                    <div class="text-center p-12 bg-zinc-900/20 border border-dashed border-zinc-800 rounded-xl text-zinc-600 text-xs">
                        No gold prints logged yet. Execute, record metrics, master execution.
                    </div>
                `;
            } else {
                trades.forEach((trade) => {
                    const isWin = trade.pnl >= 0;
                    const pnlClass = isWin ? 'text-emerald-400' : 'text-rose-500';
                    const directionClass = trade.direction === 'LONG' ? 'bg-emerald-500/5 text-emerald-400 border-emerald-500/10' : 'bg-rose-500/5 text-rose-500 border-rose-500/10';

                    const logCard = document.createElement('div');
                    logCard.className = 'bg-zinc-900 border border-zinc-800/80 rounded-xl p-4 hover:border-zinc-700 transition duration-150 relative';
                    logCard.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center space-x-3">
                                <span class="text-[10px] font-mono font-bold px-2 py-0.5 rounded border ${directionClass}">${trade.direction}</span>
                                <span class="text-[11px] text-zinc-500 font-mono">${trade.dateFormatted}</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="font-mono font-bold text-sm ${pnlClass}">${isWin ? '+' : ''}$${parseFloat(trade.pnl).toFixed(2)}</span>
                                <div class="flex space-x-2 text-zinc-600 text-xs ml-2">
                                    <button onclick="initiateEdit('${trade.id}')" class="hover:text-amber-400 transition cursor-pointer" title="Edit entry">✏️</button>
                                    <button onclick="deleteTrade('${trade.id}')" class="hover:text-rose-400 transition cursor-pointer font-bold px-1" title="Delete entry">✕</button>
                                </div>
                            </div>
                        </div>
                        ${trade.notes ? `<p class="text-zinc-400 text-xs border-t border-zinc-800/60 pt-2.5 leading-relaxed bg-zinc-950/40 p-2 rounded font-sans">${escapeHTML(trade.notes)}</p>` : ''}
                    `;
                    logsContainer.appendChild(logCard);
                });
            }

            // Top Dashboard Render Metrics
            totalPnlEl.textContent = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
            totalPnlEl.className = `text-base font-mono font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;
            balanceEl.textContent = `$${netBalance.toFixed(2)}`;

            // Progression Bar Framework
            let percentage = (totalPnl / targetGoal) * 100;
            if (percentage < 0) percentage = 0;
            if (percentage > 100) percentage = 100;
            
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${Math.round(percentage)}%`;

            const remaining = targetGoal - totalPnl;
            if (remaining <= 0) {
                remainingText.textContent = "Goal Achieved! 🏆";
                remainingText.className = "text-amber-400 font-bold";
            } else {
                remainingText.textContent = `Remaining: $${remaining.toFixed(2)}`;
                remainingText.className = "text-zinc-500";
            }
        }

        // Commit state metadata modifications
        function saveAccountMeta() {
            accountMeta = {
                deposit: parseFloat(depositInput.value) || 0,
                bonus: parseFloat(bonusInput.value) || 0,
                target: parseFloat(targetInput.value) || 1000,
                webhookUrl: webhookInput.value.trim()
            };
            localStorage.setItem('elite_gold_meta', JSON.stringify(accountMeta));
            renderJournal();
        }

        [depositInput, bonusInput, targetInput, webhookInput].forEach(element => {
            element.addEventListener('input', saveAccountMeta);
        });

        // Trigger Inline Editing Operations
        window.initiateEdit = function(id) {
            const targetTrade = trades.find(t => t.id === id);
            if (!targetTrade) return;

            editIdInput.value = targetTrade.id;
            document.getElementById('direction').value = targetTrade.direction;
            document.getElementById('pnl').value = targetTrade.pnl;
            
            if (targetTrade.dateISO) {
                const localDate = new Date(targetTrade.dateISO);
                const year = localDate.getFullYear();
                const month = String(localDate.getMonth() + 1).padStart(2, '0');
                const day = String(localDate.getDate()).padStart(2, '0');
                const hours = String(localDate.getHours()).padStart(2, '0');
                const minutes = String(localDate.getMinutes()).padStart(2, '0');
                document.getElementById('custom-date').value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            document.getElementById('notes').value = targetTrade.notes;

            formTitle.firstElementChild.textContent = "Modify Gold Entry";
            submitBtn.textContent = "Update Entry";
            submitBtn.className = "flex-1 bg-amber-600 hover:bg-amber-500 text-zinc-950 font-black py-2.5 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs";
            cancelEditBtn.classList.remove('hidden');
            
            window.scrollTo({ top: tradeForm.offsetTop - 20, behavior: 'smooth' });
        }

        function resetFormMode() {
            editIdInput.value = "";
            tradeForm.reset();
            formTitle.firstElementChild.textContent = "Log Gold Print";
            submitBtn.textContent = "Commit Entry";
            submitBtn.className = "flex-1 bg-amber-500 hover:bg-amber-600 text-zinc-950 font-black py-2.5 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs";
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.addEventListener('click', resetFormMode);

        tradeForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const editId = editIdInput.value;
            const customDateValue = document.getElementById('custom-date').value;
            let executionDate = customDateValue ? new Date(customDateValue) : new Date();

            const pnlValue = parseFloat(document.getElementById('pnl').value);
            const directionValue = document.getElementById('direction').value;
            const notesValue = document.getElementById('notes').value;
            const formattedDateString = executionDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });

            if (editId) {
                trades = trades.map(t => t.id === editId ? {
                    ...t,
                    direction: directionValue,
                    pnl: pnlValue,
                    notes: notesValue,
                    dateISO: executionDate.toISOString(),
                    dateFormatted: formattedDateString
                } : t);
            } else {
                const newTrade = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                    direction: directionValue,
                    pnl: pnlValue,
                    notes: notesValue,
                    dateISO: executionDate.toISOString(),
                    dateFormatted: formattedDateString
                };
                trades.push(newTrade);
            }

            localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
            resetFormMode();
            renderJournal();
        });

        window.deleteTrade = function(id) {
            if(confirm("Delete this metric print?")) {
                if(editIdInput.value === id) resetFormMode();
                trades = trades.filter(t => t.id !== id);
                localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
                renderJournal();
            }
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('Permanently wipe your complete XAUUSD tracking footprint?')) {
                trades = [];
                localStorage.removeItem('elite_gold_trades');
                resetFormMode();
                renderJournal();
            }
        });

        // PUSH DATA TO SHEETS
        syncBtn.addEventListener('click', async () => {
            const url = webhookInput.value.trim();
            if (!url) {
                alert("Please add your Google Apps Script Webhook URL first.");
                return;
            }

            syncBtn.disabled = true;
            syncBtn.textContent = "Syncing...";

            const datasetPayload = {
                metadata: {
                    deposit: parseFloat(depositInput.value) || 0,
                    bonus: parseFloat(bonusInput.value) || 0,
                    target: parseFloat(targetInput.value) || 1000
                },
                ledger: trades
            };

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datasetPayload)
                });
                alert("Data matrix pushed successfully to Google Sheets!");
            } catch (err) {
                console.error(err);
                alert("Error pushing payload matrix.");
            } finally {
                syncBtn.disabled = false;
                syncBtn.textContent = "🔗 Push to Sheets";
            }
        });

        // PULL DATA FROM SHEETS
        pullBtn.addEventListener('click', async () => {
            let url = webhookInput.value.trim();
            if (!url) {
                alert("Please add your Google Apps Script Webhook URL first.");
                return;
            }

            pullBtn.disabled = true;
            pullBtn.textContent = "Pulling...";

            // Workaround for multiple Google accounts bug: add /a/*/ if not present
            if (url.includes("script.google.com") && !url.includes("/a/*/")) {
                url = url.replace("script.google.com/", "script.google.com/a/*/");
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    alert("Sheets error: " + data.error);
                } else {
                    // Overwrite local memory structures with Sheet's truth data
                    trades = data.ledger || [];
                    
                    if(data.metadata) {
                        depositInput.value = data.metadata.deposit || '';
                        bonusInput.value = data.metadata.bonus || '';
                        targetInput.value = data.metadata.target || 1000;
                        saveAccountMeta();
                    }
                    
                    localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
                    renderJournal();
                    alert("Database synchronized successfully from Google Sheets!");
                }
            } catch (err) {
                console.error(err);
                alert("Failed to fetch data matrix from Google Sheets. Ensure you deployed your script correctly as 'Anyone'.");
            } finally {
                pullBtn.disabled = false;
                pullBtn.textContent = "📥 Pull From Sheets";
            }
        });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        renderJournal();
    </script>
</body>
</html>
