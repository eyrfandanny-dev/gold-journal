<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD Obsidian Journal Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased selection:bg-amber-500/30">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-6 border-b border-zinc-800 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-500 bg-clip-text text-transparent tracking-tight">XAUUSD JOURNAL ELITE</h1>
                
                <div class="mt-3 flex items-center gap-2 flex-wrap">
                    <select id="account-select" class="bg-zinc-900 border border-zinc-800 text-amber-400 font-black px-3 py-1.5 rounded-lg text-xs tracking-wide uppercase focus:outline-none focus:border-amber-500 cursor-pointer"></select>
                    <button id="add-account-btn" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 font-bold px-3 py-1.5 rounded-lg text-xs uppercase tracking-wider cursor-pointer transition">➕ Add Account</button>
                    <button id="delete-account-btn" class="bg-zinc-950 hover:bg-rose-950/40 border border-zinc-900 text-zinc-600 hover:text-rose-400 font-bold px-3 py-1.5 rounded-lg text-xs uppercase tracking-wider cursor-pointer transition">🗑️ Remove Active</button>
                    <button id="force-clear-cache-btn" class="text-[10px] text-zinc-700 hover:text-amber-500/60 ml-2 transition underline cursor-pointer">Force App Refresh</button>
                </div>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl min-w-[280px] w-full md:w-auto">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider">Growth Target Progress</span>
                    <div class="flex items-center space-x-1">
                        <span class="text-[10px] text-zinc-500 font-mono">Target: $</span>
                        <input type="number" id="target-input" class="w-20 bg-zinc-950 border border-zinc-800 rounded text-right px-1.5 py-0.5 text-xs font-mono text-amber-400 focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                <div class="w-full bg-zinc-950 h-2 rounded-full border border-zinc-800 overflow-hidden mb-1">
                    <div id="target-progress-bar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-full w-0 transition-all duration-500 ease-out"></div>
                </div>
                <div class="flex justify-between items-center text-[10px] font-mono text-zinc-500">
                    <span id="progress-text">0%</span>
                    <span id="remaining-text">Remaining: $0.00</span>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-6">
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Initial Deposit</label>
                <div class="flex items-center border-b border-zinc-800 focus-within:border-amber-500 pb-0.5">
                    <span class="text-xs font-mono text-zinc-400 mr-0.5">$</span>
                    <input type="number" step="any" id="deposit-input" class="w-full bg-transparent text-sm font-mono font-bold text-zinc-200 focus:outline-none" placeholder="0.00">
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Active Bonus</label>
                <div class="flex items-center border-b border-zinc-800 focus-within:border-amber-500 pb-0.5">
                    <span class="text-xs font-mono text-zinc-400 mr-0.5">$</span>
                    <input type="number" step="any" id="bonus-input" class="w-full bg-transparent text-sm font-mono font-bold text-zinc-200 focus:outline-none" placeholder="0.00">
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Total Withdrawals</label>
                <div class="pt-0.5">
                    <span id="total-withdrawals-text" class="text-sm font-mono font-bold text-rose-400">$0.00</span>
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-1">Net P&L Return</label>
                <div class="pt-0.5">
                    <span id="total-pnl" class="text-sm font-mono font-bold text-zinc-400">$0.00</span>
                </div>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Win Rate</label>
                <div class="flex items-baseline space-x-2 pt-0.5">
                    <span id="win-rate-text" class="text-sm font-mono font-bold text-amber-400">0%</span>
                    <span id="trade-ratio-text" class="text-[10px] font-mono text-zinc-500">(0/0)</span>
                </div>
            </div>
            <div class="bg-zinc-900 border border-amber-500/30 p-4 rounded-xl bg-gradient-to-br from-zinc-900 to-amber-950/10 col-span-2 md:col-span-1">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-amber-400 mb-1">Account Balance</label>
                <div class="pt-0.5">
                    <span id="account-balance" class="text-sm font-mono font-black text-amber-400">$0.00</span>
                </div>
            </div>
        </section>

        <section class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl mb-6 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
            <div class="flex-1 w-full text-left">
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400">Google Apps Script Webhook URL</label>
                    <div class="flex items-center gap-1.5">
                        <span id="sync-indicator" class="w-2 h-2 rounded-full bg-zinc-600"></span>
                        <span id="sync-status-text" class="text-[10px] uppercase font-mono font-bold text-zinc-500 tracking-wider">Ready</span>
                    </div>
                </div>
                <input type="url" id="webhook-input" placeholder="https://script.google.com/macros/s/.../exec" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-xs font-mono text-zinc-300 focus:outline-none focus:border-amber-500">
            </div>
            <div class="flex gap-2 self-stretch md:self-end">
                <button id="pull-btn" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-amber-400 font-bold px-4 py-2 rounded text-xs tracking-wider uppercase transition cursor-pointer whitespace-nowrap">
                    📥 Pull From Sheets
                </button>
                <button id="sync-btn" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-400 font-bold px-4 py-2 rounded text-xs tracking-wider uppercase transition cursor-pointer whitespace-nowrap">
                    🔗 Force Push
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
                    <button type="button" onclick="toggleSection('trade-section-body')" class="w-full text-left p-4 bg-zinc-900/60 font-bold uppercase tracking-wider text-xs text-zinc-300 flex justify-between items-center border-b border-zinc-800 cursor-pointer">
                        <span>📊 Log Gold Print</span>
                        <span id="trade-section-body-icon" class="text-zinc-500">▼</span>
                    </button>
                    <div id="trade-section-body" class="p-5 space-y-4">
                        <form id="trade-form" class="space-y-4">
                            <input type="hidden" id="edit-id" value="">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Direction</label>
                                    <select id="direction" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 font-medium focus:outline-none focus:border-amber-500 text-xs">
                                        <option value="LONG">Long (Buy)</option>
                                        <option value="SHORT">Short (Sell)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Net P&L ($)</label>
                                    <input type="number" step="any" id="pnl" required placeholder="e.g. 150 or -80" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-100 font-mono text-xs focus:outline-none focus:border-amber-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Execution Time</label>
                                <input type="datetime-local" id="custom-date" class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 font-mono text-xs focus:outline-none focus:border-amber-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Journal Notes & Psychology</label>
                                <textarea id="notes" rows="3" placeholder="Technical setup reasons..." class="w-full bg-zinc-950 border border-zinc-800 rounded p-2 text-zinc-200 focus:outline-none focus:border-amber-500 text-xs leading-relaxed"></textarea>
                            </div>
                            <div class="flex gap-2">
                                <button type="submit" id="submit-btn" class="flex-1 bg-amber-500 hover:bg-amber-600 text-zinc-950 font-black py-2 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs">
                                    Commit Entry
                                </button>
                                <button type="button" id="cancel-edit-btn" class="hidden bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-bold py-2 px-3 rounded transition cursor-pointer text-xs">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden">
                    <button type="button" onclick="toggleSection('fx-section-body')" class="w-full text-left p-4 bg-zinc-900/60 font-bold uppercase tracking-wider text-xs text-zinc-300 flex justify-between items-center border-b border-zinc-800 cursor-pointer">
                        <span>💱 FX USD / SGD Convertor</span>
                        <span id="fx-section-body-icon" class="text-zinc-500">▶</span>
                    </button>
                    <div id="fx-section-body" class="p-5 space-y-4 hidden">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Amount (USD)</label>
                                <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded px-2 py-1.5 focus-within:border-amber-500">
                                    <span class="text-xs font-mono text-zinc-500 mr-1">$</span>
                                    <input type="number" step="any" id="fx-usd-input" placeholder="0.00" class="w-full bg-transparent font-mono text-xs text-zinc-100 focus:outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Amount (SGD)</label>
                                <div class="flex items-center bg-zinc-950 border border-zinc-800 rounded px-2 py-1.5 focus-within:border-amber-500">
                                    <span class="text-xs font-mono text-zinc-500 mr-1">S$</span>
                                    <input type="number" step="any" id="fx-sgd-input" placeholder="0.00" class="w-full bg-transparent font-mono text-xs text-zinc-100 focus:outline-none">
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-[10px] font-mono text-zinc-500 bg-zinc-950/60 p-2 rounded border border-zinc-800/50">
                            <span>Reference Spot Rate:</span>
                            <div class="flex items-center space-x-1">
                                <span class="text-zinc-400">1 USD =</span>
                                <input type="number" step="any" id="fx-rate-input" value="1.295" class="w-14 bg-zinc-900 border border-zinc-800 text-center rounded text-amber-400 font-bold focus:outline-none">
                                <span class="text-zinc-400">SGD</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold tracking-wider text-zinc-300 uppercase">Execution Feed</h2>
                    <button id="clear-btn" class="text-xs text-zinc-600 hover:text-rose-400 transition cursor-pointer font-medium">Clear Data Matrix</button>
                </div>
                <div id="logs-container" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // --- SECURE MULTI-ACCOUNT WORKSPACE REPAIR FRAMEWORK ---
        let accountsList = ["DEFAULT ACCOUNT"];
        let activeAccountName = "DEFAULT ACCOUNT";
        
        try {
            let manifest = localStorage.getItem('elite_gold_accounts_manifest');
            if(manifest) accountsList = JSON.parse(manifest);
            let activeKey = localStorage.getItem('elite_gold_active_account_key');
            if(activeKey) activeAccountName = activeKey;
        } catch(e) {
            console.error("Storage structural reset triggered");
        }

        let trades = [];
        let withdrawals = [];
        let accountMeta = { deposit: 0, bonus: 0, target: 1000, webhookUrl: "" };

        // DOM Inputs Hook
        const accountSelect = document.getElementById('account-select');
        const addAccountBtn = document.getElementById('add-account-btn');
        const deleteAccountBtn = document.getElementById('delete-account-btn');
        const forceClearCacheBtn = document.getElementById('force-clear-cache-btn');

        const depositInput = document.getElementById('deposit-input');
        const bonusInput = document.getElementById('bonus-input');
        const targetInput = document.getElementById('target-input');
        const webhookInput = document.getElementById('webhook-input');
        
        const tradeForm = document.getElementById('trade-form');
        const editIdInput = document.getElementById('edit-id');
        const submitBtn = document.getElementById('submit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const logsContainer = document.getElementById('logs-container');
        
        const totalPnlEl = document.getElementById('total-pnl');
        const totalWithdrawalsText = document.getElementById('total-withdrawals-text');
        const balanceEl = document.getElementById('account-balance');

        function synchronizeActiveAccountMemory(targetAccountName) {
            activeAccountName = targetAccountName || "DEFAULT ACCOUNT";
            localStorage.setItem('elite_gold_active_account_key', activeAccountName);
            
            const keyPrefix = "eg_acc_" + activeAccountName.replace(/[^a-zA-Z0-9]/g, "_").toLowerCase();
            
            try {
                trades = JSON.parse(localStorage.getItem(keyPrefix + '_trades')) || [];
                withdrawals = JSON.parse(localStorage.getItem(keyPrefix + '_withdrawals')) || [];
                accountMeta = JSON.parse(localStorage.getItem(keyPrefix + '_meta')) || { deposit: 0, bonus: 0, target: 1000, webhookUrl: "" };
            } catch(err) {
                trades = []; withdrawals = []; accountMeta = { deposit: 0, bonus: 0, target: 1000, webhookUrl: "" };
            }

            depositInput.value = accountMeta.deposit || '';
            bonusInput.value = accountMeta.bonus || '';
            targetInput.value = accountMeta.target || 1000;
            webhookInput.value = accountMeta.webhookUrl || '';

            rebuildAccountSelectMenuOptions();
            renderJournal();
        }

        function rebuildAccountSelectMenuOptions() {
            accountSelect.innerHTML = '';
            accountsList.forEach(acc => {
                let opt = document.createElement('option');
                opt.value = acc;
                opt.textContent = acc.toUpperCase();
                if(acc === activeAccountName) opt.selected = true;
                accountSelect.appendChild(opt);
            });
        }

        accountSelect.addEventListener('change', (e) => { synchronizeActiveAccountMemory(e.target.value); });

        addAccountBtn.addEventListener('click', () => {
            let name = prompt("Enter custom account identification profile name:");
            if(!name || name.trim() === "") return;
            name = name.trim().toUpperCase();
            if(accountsList.includes(name)) return alert("Account identifier exists.");
            accountsList.push(name);
            localStorage.setItem('elite_gold_accounts_manifest', JSON.stringify(accountsList));
            synchronizeActiveAccountMemory(name);
        });

        deleteAccountBtn.addEventListener('click', () => {
            let pass = prompt("🔐 Enter Master Passcode to permanently delete account dataset:");
            if (pass !== "Danial92!") {
                if(pass !== null) alert("Access Denied. Passcode verification failed.");
                return;
            }
            if(accountsList.length <= 1) return alert("Operation aborted. Maintain at least 1 workspace slot.");
            
            const deadKeyPrefix = "eg_acc_" + activeAccountName.replace(/[^a-zA-Z0-9]/g, "_").toLowerCase();
            localStorage.removeItem(deadKeyPrefix + '_trades');
            localStorage.removeItem(deadKeyPrefix + '_withdrawals');
            localStorage.removeItem(deadKeyPrefix + '_meta');

            accountsList = accountsList.filter(a => a !== activeAccountName);
            localStorage.setItem('elite_gold_accounts_manifest', JSON.stringify(accountsList));
            synchronizeActiveAccountMemory(accountsList[0]);
        });

        forceClearCacheBtn.addEventListener('click', () => {
            if(confirm("Force clean all cached browser slots? This clears memory conflicts completely.")){
                localStorage.clear();
                location.reload();
            }
        });

        function saveAccountMeta() {
            const keyPrefix = "eg_acc_" + activeAccountName.replace(/[^a-zA-Z0-9]/g, "_").toLowerCase();
            accountMeta = {
                deposit: parseFloat(depositInput.value) || 0,
                bonus: parseFloat(bonusInput.value) || 0,
                target: parseFloat(targetInput.value) || 1000,
                webhookUrl: webhookInput.value.trim()
            };
            localStorage.setItem(keyPrefix + '_meta', JSON.stringify(accountMeta));
        }

        function handleMetaInputChange() {
            saveAccountMeta();
            renderJournal();
        }

        [depositInput, bonusInput, targetInput, webhookInput].forEach(el => el.addEventListener('input', handleMetaInputChange));

        // BULLETPROOF FORM LOGGER HANDLER
        tradeForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const pnlField = document.getElementById('pnl');
            const directionField = document.getElementById('direction');
            const notesField = document.getElementById('notes');
            const customDateField = document.getElementById('custom-date');

            if(!pnlField || !directionField) return;

            const pnlValue = parseFloat(pnlField.value);
            const directionValue = directionField.value;
            const notesValue = notesField ? notesField.value : "";
            
            let executionDate = customDateField && customDateField.value ? new Date(customDateField.value) : new Date();
            const formattedDateString = executionDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });

            const newTrade = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                direction: directionValue,
                pnl: pnlValue,
                notes: notesValue,
                dateISO: executionDate.toISOString(),
                dateFormatted: formattedDateString
            };

            trades.push(newTrade);
            
            const keyPrefix = "eg_acc_" + activeAccountName.replace(/[^a-zA-Z0-9]/g, "_").toLowerCase();
            localStorage.setItem(keyPrefix + '_trades', JSON.stringify(trades));
            
            // Clean fields manually to prevent loops
            pnlField.value = "";
            if(notesField) notesField.value = "";
            if(customDateField) customDateField.value = "";
            
            renderJournal();
            triggerSilentBackgroundSync();
        });

        function renderJournal() {
            if(!logsContainer) return;
            logsContainer.innerHTML = '';
            
            let totalPnl = trades.reduce((sum, t) => sum + (parseFloat(t.pnl) || 0), 0);
            let deposit = parseFloat(depositInput.value) || 0;
            let bonus = parseFloat(bonusInput.value) || 0;
            let netBalance = deposit + bonus + totalPnl;

            if (trades.length === 0) {
                logsContainer.innerHTML = `<div class="text-center p-12 bg-zinc-900/20 border border-dashed border-zinc-800 rounded-xl text-zinc-600 text-xs">No gold prints logged yet.</div>`;
            } else {
                // Render feeds chronologically
                let sorted = [...trades].sort((a,b) => new Date(b.dateISO) - new Date(a.dateISO));
                sorted.forEach((trade) => {
                    const isWin = trade.pnl >= 0;
                    const logCard = document.createElement('div');
                    logCard.className = 'bg-zinc-900 border border-zinc-800/80 rounded-xl p-4 flex flex-col gap-2 text-xs';
                    logCard.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-mono font-bold px-2 py-0.5 rounded border ${trade.direction === 'LONG' ? 'text-emerald-400 bg-emerald-500/5 border-emerald-500/10':'text-rose-500 bg-rose-500/5 border-rose-500/10'}">${trade.direction}</span>
                            <span class="font-mono font-bold ${isWin ? 'text-emerald-400':'text-rose-500'}">${isWin ? '+':''}$${parseFloat(trade.pnl).toFixed(2)}</span>
                        </div>
                        ${trade.notes ? `<p class="text-zinc-400 bg-zinc-950/40 p-2 rounded leading-relaxed">${trade.notes}</p>`:''}
                    `;
                    logsContainer.appendChild(logCard);
                });
            }

            if(totalPnlEl) totalPnlEl.textContent = `${totalPnl >= 0 ? '+':''}$${totalPnl.toFixed(2)}`;
            if(balanceEl) balanceEl.textContent = `$${netBalance.toFixed(2)}`;
        }

        async function triggerSilentBackgroundSync() {
            const url = webhookInput.value.trim();
            if (!url || url === "") return;
            const datasetPayload = { accountPrefix: activeAccountName, metadata: { deposit: parseFloat(depositInput.value) || 0, bonus: parseFloat(bonusInput.value) || 0, target: parseFloat(targetInput.value) || 1000 }, ledger: trades, withdrawals: withdrawals };
            try { await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datasetPayload) }); } catch (err) {}
        }

        window.toggleSection = function(id) {
            const el = document.getElementById(id);
            if(el) el.classList.toggle('hidden');
        };

        // Start App Run
        synchronizeActiveAccountMemory(activeAccountName);
    </script>
</body>
</html>
