    <!-- Scripting Engine Logic Framework Block -->
    <script>
        // Database State
        let trades = JSON.parse(localStorage.getItem('elite_gold_trades')) || [];
        let accountMeta = JSON.parse(localStorage.getItem('elite_gold_meta')) || { deposit: 0, bonus: 0, target: 1000, webhookUrl: '' };

        // Calendar Global Context Parameters Tracker
        let currentCalendarDate = new Date();

        // DOM Inputs Initialization Hooks
        const depositInput = document.getElementById('deposit-input');
        const bonusInput = document.getElementById('bonus-input');
        const targetInput = document.getElementById('target-input');
        const webhookInput = document.getElementById('webhook-input');
        
        depositInput.value = accountMeta.deposit || '';
        bonusInput.value = accountMeta.bonus || '';
        targetInput.value = accountMeta.target || 1000;
        webhookInput.value = accountMeta.webhookUrl || '';

        // UI Architecture Structural Anchors
        const tradeForm = document.getElementById('trade-form');
        const editIdInput = document.getElementById('edit-id');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const logsContainer = document.getElementById('logs-container');
        const totalPnlEl = document.getElementById('total-pnl');
        const balanceEl = document.getElementById('account-balance');
        const winRateText = document.getElementById('win-rate-text');
        const tradeRatioText = document.getElementById('trade-ratio-text');
        const progressBar = document.getElementById('target-progress-bar');
        const progressText = document.getElementById('progress-text');
        const remainingText = document.getElementById('remaining-text');
        const clearBtn = document.getElementById('clear-btn');
        const syncBtn = document.getElementById('sync-btn');
        const pullBtn = document.getElementById('pull-btn');
        const syncIndicator = document.getElementById('sync-indicator');
        const syncStatusText = document.getElementById('sync-status-text');
        
        // Calendar Grid System Mappings
        const calendarTitleText = document.getElementById('calendar-title-text');
        const calendarDaysGrid = document.getElementById('calendar-days-grid');
        const prevMonthBtn = document.getElementById('prev-month-btn');
        const nextMonthBtn = document.getElementById('next-month-btn');

        // Master UI Draw Cycle Interceptor
        function renderJournal() {
            logsContainer.innerHTML = '';
            
            let totalPnl = trades.reduce((sum, t) => sum + parseFloat(t.pnl), 0);
            let deposit = parseFloat(depositInput.value) || 0;
            let bonus = parseFloat(bonusInput.value) || 0;
            let targetGoal = parseFloat(targetInput.value) || 1000;
            let netBalance = deposit + bonus + totalPnl;

            // Sort trades chronologically
            trades.sort((a, b) => new Date(b.dateISO) - new Date(a.dateISO));

            // Calculate Win Rate Metrics Engine
            let winningTrades = trades.filter(t => parseFloat(t.pnl) > 0).length;
            let totalTradesCount = trades.length;
            let computedWinRate = totalTradesCount > 0 ? Math.round((winningTrades / totalTradesCount) * 100) : 0;
            
            winRateText.textContent = `${computedWinRate}%`;
            tradeRatioText.textContent = `(${winningTrades}/${totalTradesCount} Wins)`;

            if (trades.length === 0) {
                logsContainer.innerHTML = `
                    <div class="text-center p-12 bg-zinc-900/20 border border-dashed border-zinc-800 rounded-xl text-zinc-600 text-xs">
                        No gold prints logged yet. Execute, record metrics, master execution.
                    </div>
                `;
            } else {
                trades.forEach((trade) => {
                    const isWin = trade.pnl >= 0;
                    const pnlClass = isWin ? 'text-emerald-400' : 'text-rose-500';
                    const directionClass = trade.direction === 'LONG' ? 'bg-emerald-500/5 text-emerald-400 border-emerald-500/10' : 'bg-rose-500/5 text-rose-500 border-rose-500/10';

                    const logCard = document.createElement('div');
                    logCard.className = 'bg-zinc-900 border border-zinc-800/80 rounded-xl p-4 hover:border-zinc-700 transition duration-150 relative';
                    logCard.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center space-x-3">
                                <span class="text-[10px] font-mono font-bold px-2 py-0.5 rounded border ${directionClass}">${trade.direction}</span>
                                <span class="text-[11px] text-zinc-500 font-mono">${trade.dateFormatted}</span>
                            </div>
                            <div class="flex items-center space-x-3">
                                <span class="font-mono font-bold text-sm ${pnlClass}">${isWin ? '+' : ''}$${parseFloat(trade.pnl).toFixed(2)}</span>
                                <div class="flex space-x-2 text-zinc-600 text-xs ml-2">
                                    <button onclick="initiateEdit('${trade.id}')" class="hover:text-amber-400 transition cursor-pointer" title="Edit entry">✏️</button>
                                    <button onclick="deleteTrade('${trade.id}')" class="hover:text-rose-400 transition cursor-pointer font-bold px-1" title="Delete entry">✕</button>
                                </div>
                            </div>
                        </div>
                        ${trade.notes ? `<p class="text-zinc-400 text-xs border-t border-zinc-800/60 pt-2.5 leading-relaxed bg-zinc-950/40 p-2 rounded font-sans">${escapeHTML(trade.notes)}</p>` : ''}
                    `;
                    logsContainer.appendChild(logCard);
                });
            }

            // Dashboard Component Updates
            totalPnlEl.textContent = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}`;
            totalPnlEl.className = `text-base font-mono font-bold ${totalPnl >= 0 ? 'text-emerald-400' : 'text-rose-500'}`;
            balanceEl.textContent = `$${netBalance.toFixed(2)}`;

            let percentage = (totalPnl / targetGoal) * 100;
            if (percentage < 0) percentage = 0;
            if (percentage > 100) percentage = 100;
            
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${Math.round(percentage)}%`;

            const remaining = targetGoal - totalPnl;
            if (remaining <= 0) {
                remainingText.textContent = "Goal Achieved! 🏆";
                remainingText.className = "text-amber-400 font-bold";
            } else {
                remainingText.textContent = `Remaining: $${remaining.toFixed(2)}`;
                remainingText.className = "text-zinc-500";
            }

            // Render Native Charts & Performance Matrix Calendars
            drawEquityCurveChart();
            renderPerformanceCalendar();
        }

        // Native HTML5 Vector Engine Canvas Draw Operation
        function drawEquityCurveChart() {
            const canvas = document.getElementById('equity-chart');
            const ctx = canvas.getContext('2d');
            
            // Adjust canvas parameters matching pixel display matrices sizes accurately
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

            const width = rect.width;
            const height = rect.height;

            // Wipe drawing canvas clean
            ctx.clearRect(0, 0, width, height);

            // Reconstruct timeline array progression matching data indices sequentially
            let chronologicalTrades = [...trades].sort((a, b) => new Date(a.dateISO) - new Date(b.dateISO));
            let runningPnlValues = [0];
            let aggregate = 0;
            
            chronologicalTrades.forEach(t => {
                aggregate += parseFloat(t.pnl);
                runningPnlValues.push(aggregate);
            });

            if (runningPnlValues.length <= 1) {
                ctx.fillStyle = '#52525b';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Execute positions to generate analytics graphs', width / 2, height / 2);
                return;
            }

            // Calculate grid bounds constraints
            let maxPnl = Math.max(...runningPnlValues, 10);
            let minPnl = Math.min(...runningPnlValues, -10);
            let pnlRange = maxPnl - minPnl;

            let paddingLeft = 15;
            let paddingRight = 15;
            let paddingTop = 20;
            let paddingBottom = 20;

            let chartWidth = width - paddingLeft - paddingRight;
            let chartHeight = height - paddingTop - paddingBottom;

            // Zero Baseline Axis Marker Grid Logic
            let zeroY = paddingTop + chartHeight - ((0 - minPnl) / pnlRange) * chartHeight;
            ctx.strokeStyle = '#27272a';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(paddingLeft, zeroY);
            ctx.lineTo(width - paddingRight, zeroY);
            ctx.stroke();

            // Formulate Line Vector Node Points
            let coordinatePoints = [];
            let segmentX = chartWidth / (runningPnlValues.length - 1);

            runningPnlValues.forEach((val, idx) => {
                let x = paddingLeft + (idx * segmentX);
                let y = paddingTop + chartHeight - ((val - minPnl) / pnlRange) * chartHeight;
                coordinatePoints.push({x, y});
            });

            // Draw Area Fill Shadow Matrix Gradient
            let areaGradient = ctx.createLinearGradient(0, paddingTop, 0, paddingTop + chartHeight);
            let endingPnl = runningPnlValues[runningPnlValues.length - 1];
            if (endingPnl >= 0) {
                areaGradient.addColorStop(0, 'rgba(52, 211, 153, 0.15)');
                areaGradient.addColorStop(1, 'rgba(52, 211, 153, 0.0)');
            } else {
                areaGradient.addColorStop(0, 'rgba(244, 63, 94, 0.15)');
                areaGradient.addColorStop(1, 'rgba(244, 63, 94, 0.0)');
            }

            ctx.beginPath();
            ctx.moveTo(coordinatePoints[0].x, zeroY);
            coordinatePoints.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.lineTo(coordinatePoints[coordinatePoints.length - 1].x, zeroY);
            ctx.closePath();
            ctx.fillStyle = areaGradient;
            ctx.fill();

            // Draw Core Trend Line Stroke
            ctx.beginPath();
            ctx.moveTo(coordinatePoints[0].x, coordinatePoints[0].y);
            coordinatePoints.forEach(pt => ctx.lineTo(pt.x, pt.y));
            ctx.strokeStyle = endingPnl >= 0 ? '#34d399' : '#f43f5e';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            // Render terminal boundary intersection pointer dot nodes
            let finalPt = coordinatePoints[coordinatePoints.length - 1];
            ctx.beginPath();
            ctx.arc(finalPt.x, finalPt.y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = endingPnl >= 0 ? '#34d399' : '#f43f5e';
            ctx.fill();
            ctx.strokeStyle = '#18181b';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Performance Calendar Rendering Engine
        function renderPerformanceCalendar() {
            calendarDaysGrid.innerHTML = '';
            
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();

            // Set dynamic month header labels text
            const monthNamesArray = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            calendarTitleText.textContent = `${monthNamesArray[month]} ${year}`;

            // Determine structural parameter grids boundaries
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();

            // Map standard entries to aggregated calendar buckets by date string key
            let dailyPnlMap = {};
            trades.forEach(trade => {
                if(!trade.dateISO) return;
                let dateObj = new Date(trade.dateISO);
                let dateKey = `${dateObj.getFullYear()}-${dateObj.getMonth()}-${dateObj.getDate()}`;
                dailyPnlMap[dateKey] = (dailyPnlMap[dateKey] || 0) + parseFloat(trade.pnl);
            });

            // Fill leading empty grid slots
            for (let i = 0; i < firstDayIndex; i++) {
                let blankCell = document.createElement('div');
                blankCell.className = "bg-zinc-900/10 rounded min-h-[32px]";
                calendarDaysGrid.appendChild(blankCell);
            }

            // Draw actual calendar day element cards
            for (let day = 1; day <= totalDaysInMonth; day++) {
                let dayCell = document.createElement('div');
                let cellKey = `${year}-${month}-${day}`;
                let cellPnl = dailyPnlMap[cellKey] || 0;

                let colorStylesClass = "bg-zinc-950 border border-zinc-800 text-zinc-400"; // No trade defaults configuration style
                
                if (cellPnl > 0.01) {
                    colorStylesClass = "bg-emerald-950/40 border border-emerald-500/30 text-emerald-400 font-bold";
                } else if (cellPnl < -0.01) {
                    colorStylesClass = "bg-rose-950/30 border border-rose-500/20 text-rose-400 font-bold";
                }

                dayCell.className = `rounded p-1 min-h-[34px] flex flex-col justify-between items-start ${colorStylesClass} transition duration-100 hover:border-zinc-600`;
                dayCell.innerHTML = `
                    <span class="text-[9px] block leading-none opacity-60">${day}</span>
                    ${cellPnl !== 0 ? `<span class="text-[8px] block tracking-tighter font-mono overflow-hidden max-w-full text-ellipsis">${cellPnl >= 0 ? '+' : ''}${Math.round(cellPnl)}</span>` : ''}
                `;
                calendarDaysGrid.appendChild(dayCell);
            }
        }

        // Calendar Nav Listeners
        prevMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
            renderPerformanceCalendar();
        });
        nextMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
            renderPerformanceCalendar();
        });

        // Commit state metadata modifications
        function saveAccountMeta() {
            accountMeta = {
                deposit: parseFloat(depositInput.value) || 0,
                bonus: parseFloat(bonusInput.value) || 0,
                target: parseFloat(targetInput.value) || 1000,
                webhookUrl: webhookInput.value.trim()
            };
            localStorage.setItem('elite_gold_meta', JSON.stringify(accountMeta));
            renderJournal();
        }

        let metaTimeout;
        function handleMetaInputChange() {
            saveAccountMeta();
            clearTimeout(metaTimeout);
            metaTimeout = setTimeout(() => {
                triggerSilentBackgroundSync();
            }, 1500);
        }

        [depositInput, bonusInput, targetInput, webhookInput].forEach(element => {
            element.addEventListener('input', handleMetaInputChange);
        });

        // Trigger Inline Editing Operations
        window.initiateEdit = function(id) {
            const targetTrade = trades.find(t => t.id === id);
            if (!targetTrade) return;

            editIdInput.value = targetTrade.id;
            document.getElementById('direction').value = targetTrade.direction;
            document.getElementById('pnl').value = targetTrade.pnl;
            
            if (targetTrade.dateISO) {
                const localDate = new Date(targetTrade.dateISO);
                const year = localDate.getFullYear();
                const month = String(localDate.getMonth() + 1).padStart(2, '0');
                const day = String(localDate.getDate()).padStart(2, '0');
                const hours = String(localDate.getHours()).padStart(2, '0');
                const minutes = String(localDate.getMinutes()).padStart(2, '0');
                document.getElementById('custom-date').value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }

            document.getElementById('notes').value = targetTrade.notes;

            formTitle.firstElementChild.textContent = "Modify Gold Entry";
            submitBtn.textContent = "Update Entry";
            submitBtn.className = "flex-1 bg-amber-600 hover:bg-amber-500 text-zinc-950 font-black py-2.5 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs";
            cancelEditBtn.classList.remove('hidden');
            
            window.scrollTo({ top: tradeForm.offsetTop - 20, behavior: 'smooth' });
        }

        function resetFormMode() {
            editIdInput.value = "";
            tradeForm.reset();
            formTitle.firstElementChild.textContent = "Log Gold Print";
            submitBtn.textContent = "Commit Entry";
            submitBtn.className = "flex-1 bg-amber-500 hover:bg-amber-600 text-zinc-950 font-black py-2.5 px-4 rounded transition duration-200 cursor-pointer uppercase tracking-wider text-xs";
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.addEventListener('click', resetFormMode);

        tradeForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const editId = editIdInput.value;
            const customDateValue = document.getElementById('custom-date').value;
            let executionDate = customDateValue ? new Date(customDateValue) : new Date();

            const pnlValue = parseFloat(document.getElementById('pnl').value);
            const directionValue = document.getElementById('direction').value;
            const notesValue = document.getElementById('notes').value;
            const formattedDateString = executionDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });

            if (editId) {
                trades = trades.map(t => t.id === editId ? {
                    ...t,
                    direction: directionValue,
                    pnl: pnlValue,
                    notes: notesValue,
                    dateISO: executionDate.toISOString(),
                    dateFormatted: formattedDateString
                } : t);
            } else {
                const newTrade = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                    direction: directionValue,
                    pnl: pnlValue,
                    notes: notesValue,
                    dateISO: executionDate.toISOString(),
                    dateFormatted: formattedDateString
                };
                trades.push(newTrade);
            }

            localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
            resetFormMode();
            renderJournal();
            triggerSilentBackgroundSync();
        });

        window.deleteTrade = function(id) {
            if(confirm("Delete this metric print?")) {
                if(editIdInput.value === id) resetFormMode();
                trades = trades.filter(t => t.id !== id);
                localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
                renderJournal();
                triggerSilentBackgroundSync();
            }
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('Permanently wipe your complete XAUUSD tracking footprint?')) {
                trades = [];
                localStorage.removeItem('elite_gold_trades');
                resetFormMode();
                renderJournal();
                triggerSilentBackgroundSync();
            }
        });

        // BACKGROUND TRANSMISSION ENGINE (AUTO SYNC)
        async function triggerSilentBackgroundSync() {
            const url = webhookInput.value.trim();
            if (!url) return;

            syncIndicator.className = "w-2 h-2 rounded-full bg-amber-400 animate-pulse";
            syncStatusText.textContent = "Syncing...";
            syncStatusText.className = "text-[10px] uppercase font-mono font-bold text-amber-400 tracking-wider";

            const datasetPayload = {
                metadata: {
                    deposit: parseFloat(depositInput.value) || 0,
                    bonus: parseFloat(bonusInput.value) || 0,
                    target: parseFloat(targetInput.value) || 1000
                },
                ledger: trades
            };

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datasetPayload)
                });
                
                syncIndicator.className = "w-2 h-2 rounded-full bg-emerald-500";
                syncStatusText.textContent = "Saved to Sheet";
                syncStatusText.className = "text-[10px] uppercase font-mono font-bold text-emerald-500 tracking-wider";
            } catch (err) {
                console.error("Background sync error:", err);
                syncIndicator.className = "w-2 h-2 rounded-full bg-rose-500";
                syncStatusText.textContent = "Sync Failed";
                syncStatusText.className = "text-[10px] uppercase font-mono font-bold text-rose-500 tracking-wider";
            }
        }

        syncBtn.addEventListener('click', () => {
            if (!webhookInput.value.trim()) {
                alert("Please add your Google Apps Script Webhook URL first.");
                return;
            }
            triggerSilentBackgroundSync();
        });

        // PULL DATA FROM SHEETS
        pullBtn.addEventListener('click', async () => {
            let url = webhookInput.value.trim();
            if (!url) {
                alert("Please add your Google Apps Script Webhook URL first.");
                return;
            }

            pullBtn.disabled = true;
            pullBtn.textContent = "Pulling...";

            if (url.includes("script.google.com") && !url.includes("/a/*/")) {
                url = url.replace("script.google.com/", "script.google.com/a/*/");
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.error) {
                    alert("Sheets error: " + data.error);
                } else {
                    trades = data.ledger || [];
                    
                    if(data.metadata) {
                        depositInput.value = data.metadata.deposit || '';
                        bonusInput.value = data.metadata.bonus || '';
                        targetInput.value = data.metadata.target || 1000;
                        
                        accountMeta = {
                            deposit: parseFloat(depositInput.value) || 0,
                            bonus: parseFloat(bonusInput.value) || 0,
                            target: parseFloat(targetInput.value) || 1000,
                            webhookUrl: webhookInput.value.trim()
                        };
                        localStorage.setItem('elite_gold_meta', JSON.stringify(accountMeta));
                    }
                    
                    localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
                    renderJournal();
                    
                    syncIndicator.className = "w-2 h-2 rounded-full bg-emerald-500";
                    syncStatusText.textContent = "Synced & Up to Date";
                    syncStatusText.className = "text-[10px] uppercase font-mono font-bold text-emerald-500 tracking-wider";
                }
            } catch (err) {
                console.error(err);
                alert("Failed to fetch data matrix from Google Sheets.");
            } finally {
                pullBtn.disabled = false;
                pullBtn.textContent = "📥 Pull From Sheets";
            }
        });

        // Redraw canvas bounds correctly on screen width size scale changes
        window.addEventListener('resize', drawEquityCurveChart);

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
// AUTOMATIC BACKGROUND RETRIEVAL LOOP (Auto-Fetch)
setInterval(async () => {
    // Only run if you are not currently editing a trade and if a URL exists
    if (document.getElementById('edit-id').value !== "" || !webhookInput.value.trim()) return;
    
    let url = webhookInput.value.trim();
    if (url.includes("script.google.com") && !url.includes("/a/*/")) {
        url = url.replace("script.google.com/", "script.google.com/a/*/");
    }

    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data && !data.error && data.ledger) {
            // Check if incoming sheet data has a different number of trades or updated IDs
            if (JSON.stringify(data.ledger) !== localStorage.getItem('elite_gold_trades')) {
                trades = data.ledger;
                localStorage.setItem('elite_gold_trades', JSON.stringify(trades));
                
                if(data.metadata) {
                    depositInput.value = data.metadata.deposit || '';
                    bonusInput.value = data.metadata.bonus || '';
                    targetInput.value = data.metadata.target || 1000;
                    saveAccountMeta();
                }
                
                renderJournal();
                
                // Flash indicator green to show a background sync happened
                syncIndicator.className = "w-2 h-2 rounded-full bg-cyan-400 animate-ping";
                setTimeout(() => {
                    syncIndicator.className = "w-2 h-2 rounded-full bg-emerald-500";
                }, 1000);
            }
        }
    } catch (err) {
        console.log("Silent auto-fetch check skipped (network offline or busy).");
    }
}, 5000); // 5000 milliseconds = 5 seconds
        renderJournal();
    </script>
